{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="glass-card p-4 animate-fade">
            <h4 class="fw-bold mb-4"><i class="fas fa-plus-circle text-primary me-2"></i>New Activity</h4>
            <form action="{{ url_for('assign_activity') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Activity Title</label>
                    <input type="text" name="title" class="form-control" placeholder="e.g. Science Quiz" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Enter instructions..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">Assign to All Students</button>
            </form>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="glass-card p-4 animate-fade" style="animation-delay: 0.1s;">
            <h4 class="fw-bold mb-4">Recent Activities</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Date Assigned</th>
                            <th>Status Overview</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for act in activities %}
                        <tr>
                            <td class="fw-bold">{{ act.title }}</td>
                            <td>{{ act.date_assigned }}</td>
                            <td>
                                <span class="badge bg-info">Active</span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
