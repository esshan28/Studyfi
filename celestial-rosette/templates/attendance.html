{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="glass-card p-4 animate-fade">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold"><i class="fas fa-check-circle text-success me-2"></i>Mark Daily Attendance</h4>
                <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
            </div>
            
            <form action="{{ url_for('mark_manual') }}" method="POST" class="row g-3 align-items-center bg-light p-3 rounded mb-4">
                <div class="col-md-4">
                    <label class="form-label">Select Student</label>
                    <select name="student_id" class="form-select" required>
                        {% for s in students %}
                        <option value="{{ s.id }}">{{ s.name }} ({{ s.roll_number }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" value="{{ now }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <button type="submit" class="btn btn-primary-custom w-100">Add Record</button>
                </div>
            </form>

            <h5 class="fw-bold mb-3">Today's Class View</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Roll No</th>
                            <th>Student Name</th>
                            <th>Class</th>
                            <th>Quick Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for s in students %}
                        <tr>
                            <td>{{ s.roll_number }}</td>
                            <td class="fw-bold">{{ s.name }}</td>
                            <td>{{ s.class }}</td>
                            <td>
                                <form action="{{ url_for('mark_manual') }}" method="POST" class="d-inline">
                                    <input type="hidden" name="student_id" value="{{ s.id }}">
                                    <input type="hidden" name="date" value="{{ today }}">
                                    <input type="hidden" name="status" value="Present">
                                    <button type="submit" class="btn btn-success btn-sm me-2">Mark Present</button>
                                </form>
                                <form action="{{ url_for('mark_manual') }}" method="POST" class="d-inline">
                                    <input type="hidden" name="student_id" value="{{ s.id }}">
                                    <input type="hidden" name="date" value="{{ today }}">
                                    <input type="hidden" name="status" value="Absent">
                                    <button type="submit" class="btn btn-danger btn-sm">Mark Absent</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
